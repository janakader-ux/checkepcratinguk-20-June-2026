# netlify.toml — performance, caching & security for checkepcrating.uk
# WHERE THIS GOES: save this file in the TOP-LEVEL folder of your website
# project (the same folder Netlify builds from), then push/deploy as normal.
# Netlify reads it automatically. No other setup needed.

[build]
  # If your site is plain HTML files in the root, leave this as ".".
  # If it builds into a folder (e.g. dist / public / build), change "." to that.
  publish = "."

# ---------------------------------------------------------------------------
# CACHING: tells browsers to keep static files for a while, so repeat visits
# (and Google's crawler) load faster. Values are conservative & safe — your
# changes still appear within a week, and HTML always updates immediately.
# ---------------------------------------------------------------------------

# Images cached for 1 week
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# CSS & JS cached for 1 week
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ---------------------------------------------------------------------------
# SECURITY HEADERS + always-fresh HTML.
# These are good-practice signals and don't change how your site looks.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
