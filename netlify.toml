# ============================================================
#  netlify.toml  —  checkepcrating.uk
#  Headers + crawl-friendly settings.
#  (The 301 redirects live in the separate _redirects file.)
# ============================================================

[build]
  # Files are served from the repo root. If your build outputs
  # to a folder (e.g. "dist" or "public"), set it here instead.
  publish = "."

# Pretty URLs: serve /epc-bedford for epc-bedford.html and
# auto-redirect the .html version. Belt-and-braces with _redirects.
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

# ---- Security + SEO-friendly response headers --------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

# Long cache for static assets (images, css, js, fonts)
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Always serve sitemap/robots as fresh
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"
